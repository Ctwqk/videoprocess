services:
  postgres:
    profiles: ["standalone"]
    image: postgres:16-alpine
    container_name: vp_postgres
    environment:
      POSTGRES_DB: videoprocess
      POSTGRES_USER: vp
      POSTGRES_PASSWORD: ${VP_POSTGRES_PASSWORD:-vp_secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${VP_STANDALONE_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vp -d videoprocess"]
      interval: 5s
      retries: 5
    networks:
      - vp_internal

  redis:
    profiles: ["standalone"]
    image: redis:7-alpine
    container_name: vp_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${VP_STANDALONE_REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - vp_internal

  minio:
    profiles: ["standalone"]
    image: minio/minio:latest
    container_name: vp_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${VP_STANDALONE_MINIO_API_PORT:-9000}:9000"
      - "${VP_STANDALONE_MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null",
        ]
      interval: 5s
      retries: 5
    networks:
      - vp_internal

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: vp_api
    restart: unless-stopped
    environment:
      DEPLOY_MODE: ${DEPLOY_MODE:-shared}
      DATABASE_URL: ${VP_DATABASE_URL:-postgresql+asyncpg://vp:${VP_POSTGRES_PASSWORD:-vp_secret}@host.docker.internal:5435/videoprocess}
      REDIS_URL: ${VP_REDIS_URL:-redis://host.docker.internal:6380/0}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_LOCAL_ROOT: /data/storage
      MINIO_ENDPOINT: ${VP_MINIO_ENDPOINT:-host.docker.internal:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: videoprocess
      EXO_WATCHDOG_URL: ${VP_WATCHDOG_URL:-http://host.docker.internal:8000}
      EMBEDDING_GATEWAY_URL: ${VP_EMBEDDING_GATEWAY_URL:-http://host.docker.internal:8080}
      QDRANT_URL: ${VP_QDRANT_URL:-http://host.docker.internal:6333}
      VIDEO_SCHEDULE_DEFAULT_STATE: ${VIDEO_SCHEDULE_DEFAULT_STATE:-OPEN}
      PLATFORM_BROWSER_MANAGER_URL: http://host.docker.internal:8898
      X_PLATFORM_BROWSER_MANAGER_URL: http://host.docker.internal:8898
      XIAOHONGSHU_PLATFORM_BROWSER_MANAGER_URL: http://host.docker.internal:8897
    volumes:
      - ${VP_STORAGE_ROOT:-./k8s-data/storage}:/data/storage
    ports:
      - "${API_PORT:-18080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - vp_internal

  ffmpeg-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: vp_ffmpeg_worker_1
    restart: unless-stopped
    environment:
      DEPLOY_MODE: ${DEPLOY_MODE:-shared}
      REDIS_URL: ${VP_REDIS_URL:-redis://host.docker.internal:6380/0}
      WORKER_TYPE: ffmpeg
      WORKER_CONCURRENCY: "2"
      STORAGE_LOCAL_ROOT: /data/storage
      DATABASE_URL: ${VP_DATABASE_URL:-postgresql+asyncpg://vp:${VP_POSTGRES_PASSWORD:-vp_secret}@host.docker.internal:5435/videoprocess}
      YOUTUBE_CREDENTIALS_DIR: /app/youtube_credentials
      PLATFORM_BROWSER_MANAGER_URL: http://host.docker.internal:8898
      X_PLATFORM_BROWSER_MANAGER_URL: http://host.docker.internal:8898
      XIAOHONGSHU_PLATFORM_BROWSER_MANAGER_URL: http://host.docker.internal:8897
      VIDEO_LLM_BASE_URL: ${VP_LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      VIDEO_TTS_BASE_URL: ${VP_XTTS_BASE_URL:-http://host.docker.internal:8010}
    volumes:
      - ${VP_STORAGE_ROOT:-./k8s-data/storage}:/data/storage
      - ../../platform-upload/YouTubeManager/credentials:/app/youtube_credentials
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - vp_internal

  youtube-manager:
    build:
      context: ../../platform-upload/YouTubeManager
      dockerfile: Dockerfile
    container_name: vp_youtube_manager
    restart: unless-stopped
    environment:
      GOOGLE_CLIENT_SECRETS_FILE: /app/credentials/client_secret_62449607041-mn44n8pmkl9pc6tdah7bmd67tid3qgc5.apps.googleusercontent.com.json
      DOWNLOAD_DIR: /app/downloads
      OAUTH_REDIRECT_URI: http://localhost:3001/youtube/api/auth/callback
    volumes:
      - ../../platform-upload/YouTubeManager/downloads:/app/downloads
      - ../../platform-upload/YouTubeManager/credentials:/app/credentials
    networks:
      - vp_internal

  platform-browser-manager:
    build:
      context: ../../platform-upload/PlatformBrowserManager
      dockerfile: Dockerfile
    container_name: vp_platform_browser_manager
    restart: unless-stopped
    environment:
      OPENCLI_VERSION: "1.5.3"
      DOWNLOAD_ROOT: /app/downloads
      BROWSER_PROFILE_ROOT: /app/browser-profiles
      DISPLAY: ${DISPLAY:-}
      PLATFORM_ENABLED_PLATFORMS: bilibili,x
      X_CDP_URL: ${X_CDP_URL:-http://127.0.0.1:18810}
      X_CDP_TARGET: ${X_CDP_TARGET:-x.com}
    volumes:
      - ../../platform-upload/PlatformBrowserManager/downloads:/app/downloads
      - ../../platform-upload/PlatformBrowserManager/browser-profiles:/app/browser-profiles
    network_mode: host

  xiaohongshu-browser-manager:
    build:
      context: ../../platform-upload/PlatformBrowserManager
      dockerfile: Dockerfile
    container_name: vp_xiaohongshu_browser_manager
    restart: unless-stopped
    environment:
      OPENCLI_VERSION: "1.5.3"
      PLATFORM_BROWSER_PORT: "8898"
      DOWNLOAD_ROOT: /app/downloads
      BROWSER_PROFILE_ROOT: /app/browser-profiles
      DISPLAY: ${DISPLAY:-}
      PLATFORM_ENABLED_PLATFORMS: xiaohongshu
      PLATFORM_VIRTUAL_DISPLAY_PLATFORMS: xiaohongshu
    ports:
      - "8897:8898"
    volumes:
      - ../../platform-upload/PlatformBrowserManager/downloads:/app/downloads
      - ../../platform-upload/PlatformBrowserManager/browser-profiles:/app/browser-profiles
    networks:
      - vp_internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vp_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      - api
      - youtube-manager
      - platform-browser-manager
      - xiaohongshu-browser-manager
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - vp_internal

volumes:
  pg_data:
  redis_data:
  minio_data:

networks:
  vp_internal:
    driver: bridge
